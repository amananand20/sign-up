<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SignUp | Tic Tac Toe</title>
    <!-- UIkit CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/uikit@3.6.22/dist/css/uikit.min.css" />

    <!-- UIkit JS -->
    <script src="https://cdn.jsdelivr.net/npm/uikit@3.6.22/dist/js/uikit.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/uikit@3.6.22/dist/js/uikit-icons.min.js"></script>

    <!-- Custom CSS -->
    <link rel="stylesheet" href="./sign-up.css">
</head>

<body>
    <div class="form-container uk-container">
        <div class="uk-padding form-enclose">
            <h1 class="uk-heading uk-text-center">Sign Up</h1>
            <div class="uk-inline uk-margin-top uk-margin-top">
                <span class="uk-form-icon" uk-icon="icon: user"></span>
                <input class="uk-input" type="email" placeholder="Email">
            </div>
            <div class="uk-inline uk-margin-top">
                <span class="uk-form-icon uk-form-icon-flip" uk-icon="icon: lock"></span>
                <input class="uk-input" type="password" placeholder="Password">
            </div>
            <div class="uk-inline uk-margin-top">
                <span class="uk-form-icon uk-form-icon-flip" uk-icon="icon: lock"></span>
                <input class="uk-input" type="password" placeholder="Confirm Password">
            </div>
            <button class="uk-button uk-button-primary uk-margin-top">Sign Up</button>
            <div class="uk-margin-top uk-text-center">Other ways to Sign Up</div>
            <div class="other-methods uk-margin">
                <a href="" class="sign-link" uk-icon="facebook"></a>
                <a href="" class="sign-link" uk-icon="google"></a>
            </div>
        </div>
    </div>
</body>

</html>
